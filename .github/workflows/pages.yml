name: Publish public website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Validate public pages
        run: node scripts/check-site.mjs
      - name: Stage public files
        run: |
          mkdir _site
          cp index.html styles.css 404.html robots.txt sitemap.xml _site/
          cp -r assets auth privacy terms support data-deletion app-preview _site/
          touch _site/.nojekyll
      - name: Verify staged account and legal pages
        run: |
          test -f _site/auth/index.html
          test -f _site/auth/app.js
          test -f _site/auth/config.js
          test -f _site/privacy/index.html
          test -f _site/terms/index.html
          test -f _site/data-deletion/index.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
